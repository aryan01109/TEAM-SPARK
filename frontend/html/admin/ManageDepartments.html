<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../../css/admin/ManageDepartments.css">
  <title>Manage Departments</title>
</head>
<body>



  <!-- HEADER -->
  <header class="admin-header">
    <h2>Admin Panel</h2>
    <button id="logoutBtn">Logout</button>
  </header>

  <main class="manage-departments">

    <!-- PAGE HEADER -->
    <div class="departments-header">
      <h1>Department Management</h1>
      <button id="addDepartmentBtn" class="add-department-btn">+ Add Department</button>
    </div>

    <!-- CONTROLS -->
    <div class="controls-section">
      <div class="search-controls">
        <div class="search-box">
          <input type="text" id="searchInput" class="search-input" placeholder="Search departments..." />
          <span class="search-icon">🔍</span>
        </div>

        <div class="filter-controls">
          <select id="statusFilter">
            <option value="all">All Status</option>
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
            <option value="maintenance">Maintenance</option>
          </select>

          <select id="sortBy">
            <option value="name">Sort by Name</option>
            <option value="head">Sort by Head</option>
            <option value="budget">Sort by Budget</option>
            <option value="employees">Sort by Employees</option>
          </select>

          <button id="sortOrderBtn">↑</button>
          <button id="clearFiltersBtn">Clear</button>
        </div>
      </div>

      <div class="results-info" id="resultsInfo"></div>
    </div>

    <!-- STATS -->
    <div class="departments-stats">
      <div class="stat-card">
        <h3>Total Departments</h3>
        <div class="stat-value" id="totalDepartments">0</div>
      </div>
      <div class="stat-card">
        <h3>Total Employees</h3>
        <div class="stat-value" id="totalEmployees">0</div>
      </div>
      <div class="stat-card">
        <h3>Total Budget</h3>
        <div class="stat-value" id="totalBudget">$0</div>
      </div>
      <div class="stat-card">
        <h3>Active Issues</h3>
        <div class="stat-value" id="totalIssues">0</div>
      </div>
    </div>

    <!-- GRID -->
    <div class="departments-grid" id="departmentsGrid"></div>

  </main>

  <!-- ADD / EDIT MODAL -->
  <div class="modal-overlay hidden" id="departmentModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle"></h2>
        <button class="close-btn" onclick="closeModal()">×</button>
      </div>

      <form id="departmentForm" class="department-form">
        <input type="hidden" id="deptId" name="id" />

        <label>Department Name *</label>
        <input type="text" id="name" name="name" required />

        <label>Department Head *</label>
        <input type="text" id="head" name="head" required />

        <label>Email *</label>
        <input type="email" id="email" name="email" required />

        <label>Phone</label>
        <input type="text" id="phone" name="phone" />

        <label>Budget</label>
        <input type="number" id="budget" name="budget" />

        <label>Employees</label>
        <input type="number" id="employees" name="employees" />

        <label>Status</label>
        <select id="status" name="status">
          <option value="active">Active</option>
          <option value="inactive">Inactive</option>
          <option value="maintenance">Maintenance</option>
        </select>

        <label>Description</label>
        <textarea id="description" name="description"></textarea>

        <div class="form-actions">
          <button type="button" onclick="closeModal()">Cancel</button>
          <button type="submit">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- DELETE MODAL -->
  <div class="modal-overlay hidden" id="deleteModal">
    <div class="modal-content delete-modal">
      <h2>Confirm Delete</h2>
      <p id="deleteText"></p>

      <div class="form-actions">
        <button onclick="closeDeleteModal()">Cancel</button>
        <button class="btn-danger" onclick="confirmDelete()">Delete</button>
      </div>
    </div>
  </div>
<script src="../../js/admin/ManageDepartments.js"></script>
</body>
</html>
