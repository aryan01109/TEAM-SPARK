<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Map – Civic Issues</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- Marker Cluster -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <link rel="stylesheet" href="../../css/admin/adminmap.css" />
</head>
<body>
  <script type="module">
  import { loadHeader } from "../../js/shared/header.js";
  loadHeader("map");
</script>


<header>
  <h2>Admin Map</h2>
  <button id="logoutBtn">Logout</button>
</header>

<div class="layout">
  <div id="map"></div>

  <div class="panel">
    <h3>Issue Editor</h3>

    <form id="issueForm">
      <input id="title" placeholder="Title" required />
      <select id="priority">
        <option>High</option>
        <option>Medium</option>
        <option>Low</option>
      </select>
      <select id="status">
        <option>Pending</option>
        <option>In Progress</option>
        <option>Resolved</option>
      </select>
      <input id="department" placeholder="Department" />
      <input id="reporter" placeholder="Reporter" />
      <input id="assignedTo" placeholder="Assigned To" />
      <input id="address" placeholder="Address" />
      <input id="lat" placeholder="Latitude" required />
      <input id="lng" placeholder="Longitude" required />
      <button type="submit">Save Issue</button>
    </form>

    <h4>Priority</h4>
    <div class="legend">
      <div><span class="marker red"></span> High</div>
      <div><span class="marker orange"></span> Medium</div>
      <div><span class="marker green"></span> Low</div>
    </div>

    <h4>Heatmap</h4>
    <select id="departmentFilter">
      <option value="All">All Departments</option>
      <option>Public Works</option>
      <option>Sanitation</option>
      <option>Utilities</option>
    </select>

    <label>Hours Ago: <span id="timeLabel">24</span></label>
    <input type="range" id="timeSlider" min="1" max="168" value="24" />

    <button id="play">▶ Play</button>
    <button id="pause">⏸ Pause</button>

    <h4>Compare</h4>
    <select id="compareA">
      <option value="24">24h</option>
      <option value="168">7d</option>
    </select>
    <select id="compareB">
      <option value="168">7d</option>
      <option value="720">30d</option>
    </select>
    <button id="compareBtn">Compare</button>

    <label>
      <input type="checkbox" id="predictiveToggle" />
      Predictive Heatmap
    </label>

    <button id="exportImg">Export PNG</button>
    <button id="exportPdf">Export PDF</button>
  </div>
</div>

<!-- Libraries -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
<script src="https://unpkg.com/leaflet-image/leaflet-image.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script type="module">
  import "../../js/map/map-core.js";
  import "../../js/admin/map.js";
</script>

<script src="../../js/admin/Adminmap.js"></script>
<script type="module">
  import { protectPage } from "../../js/core/auth.js";
  protectPage("map");
</script>

</body>
</html>
