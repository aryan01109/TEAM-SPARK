<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Command Center</title>

  <link rel="stylesheet" href="../../css/design-system.css">
  <link rel="stylesheet" href="../../css/base/globals.css">
  <link rel="stylesheet" href="../../css/admin/map.css">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
  <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
</head>
<body>

<!-- Header injected -->
<main class="command-layout">
  <aside class="command-sidebar card">
    <h3>Map Controls</h3>

    <div class="section">
      <button id="toggleHeat" class="btn btn-outline">Toggle Heatmap</button>
    </div>

    <div class="section">
      <h4>Legend</h4>
      <div class="legend">
        <span class="dot high"></span> High Priority
        <span class="dot medium"></span> Medium
        <span class="dot low"></span> Low
      </div>
    </div>

    <div class="section">
      <h4>Details</h4>
      <div id="panelContent" class="muted">Select an issue</div>
    </div>
  </aside>

  <section id="map"></section>
</main>

<script type="module">
  import { protectPage } from "../../js/core/auth.js";
  import { loadHeader } from "../../js/shared/header.js";

  protectPage("map");
  loadHeader("map");
</script>

<script type="module" src="../../js/admin/map.js"></script>
</body>
</html>
