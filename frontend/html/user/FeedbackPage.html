<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="../../css/user/FeedbackPage.css">
  <title>FeedbackPage</title>
</head>
<body>
  
<div class="report-issue-page">

  <div class="report-header">
    <h1>Feedback & Suggestions</h1>
    <p>We value your feedback to improve our services</p>
  </div>

  <div class="report-form-container">

    <div id="successBox" class="success-message" hidden>
      Thank you for your feedback! We appreciate your input.
    </div>

    <div id="errorBox" class="error-message" hidden></div>

    <form id="feedbackForm" class="report-form" novalidate>

      <!-- NAME + EMAIL -->
      <div class="form-row">
        <div class="form-group">
          <label class="field-label">Name (Optional)</label>
          <input
            type="text"
            id="name"
            class="field-input"
            placeholder="Your name"
          >
        </div>

        <div class="form-group">
          <label class="field-label">Email (Optional)</label>
          <input
            type="email"
            id="email"
            class="field-input"
            placeholder="your.email@example.com"
          >
          <div id="emailError" class="field-error"></div>
        </div>
      </div>

      <!-- TYPE -->
      <div class="form-group">
        <label class="field-label">Feedback Type</label>
        <select id="feedbackType" class="field-input">
          <option value="general">General Feedback</option>
          <option value="bug">Bug Report</option>
          <option value="feature">Feature Request</option>
          <option value="complaint">Complaint</option>
          <option value="compliment">Compliment</option>
        </select>
      </div>

      <!-- SUBJECT -->
      <div class="form-group">
        <label class="field-label">Subject *</label>
        <input
          type="text"
          id="subject"
          class="field-input"
          placeholder="Brief subject of your feedback"
        >
        <div id="subjectError" class="field-error"></div>
      </div>

      <!-- RATING -->
      <div class="form-group">
        <label class="field-label">Rating</label>
        <div class="rating-container" id="ratingStars">
          <span class="star" data-value="1">★</span>
          <span class="star" data-value="2">★</span>
          <span class="star" data-value="3">★</span>
          <span class="star" data-value="4">★</span>
          <span class="star" data-value="5">★</span>
          <span class="rating-text" id="ratingText">(5/5)</span>
        </div>
      </div>

      <!-- MESSAGE -->
      <div class="form-group">
        <label class="field-label">Your Feedback *</label>
        <textarea
          id="message"
          class="field-textarea"
          rows="6"
          placeholder="Please provide detailed feedback..."
        ></textarea>
        <div id="messageError" class="field-error"></div>
      </div>

      <!-- ACTIONS -->
      <div class="form-actions">
        <button type="button" class="btn-secondary" id="cancelBtn">
          Cancel
        </button>
        <button type="submit" class="btn-primary" id="submitBtn">
          Submit Feedback
        </button>
      </div>

    </form>
  </div>
</div>
<script src="../../js/user/FeedbackPage.js"></script>
</body>
</html>
