<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="../../css/user/styles.css">
  <title>UserSettings</title>
</head>
<body>
  <!-- HEADER -->
<header class="user-header">
  <h2>User Panel</h2>
  <button id="logoutBtn">Logout</button>
</header>

<div class="profile-page">
  <div class="profile-container">
    <div class="card">
      <h2 class="card-title">User Settings</h2>

      <form id="settingsForm" class="settings-form">

        <!-- ACCOUNT INFO -->
        <div class="settings-section">
          <h3>Account Information</h3>

          <div class="form-group">
            <label>First Name</label>
            <input type="text" id="firstName" class="form-input" />
          </div>

          <div class="form-group">
            <label>Last Name</label>
            <input type="text" id="lastName" class="form-input" />
          </div>

          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" class="form-input" />
          </div>

          <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" id="phone" class="form-input" />
          </div>
        </div>

        <!-- NOTIFICATIONS -->
        <div class="settings-section">
          <h3>Notification Settings</h3>

          <label class="checkbox-option">
            <input type="checkbox" id="notifEmail" />
            Email notifications
          </label>

          <label class="checkbox-option">
            <input type="checkbox" id="notifPush" />
            Push notifications
          </label>

          <label class="checkbox-option">
            <input type="checkbox" id="notifSms" />
            SMS notifications
          </label>
        </div>

        <!-- PRIVACY -->
        <div class="settings-section">
          <h3>Privacy Settings</h3>

          <label class="checkbox-option">
            <input type="checkbox" id="privacyPublic" />
            Make profile public
          </label>

          <label class="checkbox-option">
            <input type="checkbox" id="privacyActivity" />
            Show activity feed
          </label>

          <label class="checkbox-option">
            <input type="checkbox" id="privacyShare" />
            Share data with civic partners
          </label>
        </div>

        <!-- THEME -->
        <div class="settings-section">
          <h3>Appearance</h3>

          <label class="radio-option">
            <input type="radio" name="theme" value="light" />
            Light
          </label>

          <label class="radio-option">
            <input type="radio" name="theme" value="dark" />
            Dark
          </label>

          <label class="radio-option">
            <input type="radio" name="theme" value="auto" />
            Auto
          </label>
        </div>

        <!-- ACTIONS -->
        <div class="form-actions">
          <button type="submit" class="btn-primary">Save Settings</button>
          <button type="button" id="resetBtn" class="btn-secondary">Reset</button>
        </div>

      </form>
    </div>
  </div>
</div>

<script src="../../js/user/UserSettings.js"></script>
</body>
</html>
