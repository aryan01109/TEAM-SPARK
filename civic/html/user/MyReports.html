<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  
  <title>MyReports</title>
  <link rel="stylesheet" href="../../css/user/MyReports.css">
  <link rel="stylesheet" href="../../css/header.css">

</head>
<body>

<main class="page-content">

  <div class="page-container">

    

    <section class="header-section">
      <div class="header-content">
        <h2>Track Your Issues</h2>
        <p class="muted">Monitor the progress of civic issues in real-time.</p>
      </div>

      <div class="header-actions">
        <button class="btn small outline" onclick="exportReports()">📊 Export</button>
        <button class="btn small primary action-card"onclick="window.location.href='ReportIssue.html'">
  ➕ New Report
</button>

      
      </div>
    </section>

    <div class="tab-strip">
      <button id="tabMy" class="tab tab-active" onclick="setTab('my')">My Reports</button>
      <button id="tabCommunity" class="tab" onclick="setTab('community')">Community Issues</button>
    </div>

    <div class="search-filter-row">
      <input id="searchInput" class="search-input" placeholder="Search...">

      <select id="sortSelect" class="filter-select">
        <option value="date">Sort by Date</option>
        <option value="title">Sort by Title</option>
        <option value="status">Sort by Status</option>
        <option value="priority">Sort by Priority</option>
      </select>

      <select id="statusSelect" class="filter-select">
        <option value="all">All</option>
        <option value="pending">Pending</option>
        <option value="in-progress">In Progress</option>
        <option value="resolved">Resolved</option>
      </select>

      <select id="viewSelect" class="view-select">
        <option value="card">Card View</option>
        <option value="list">List View</option>
        <option value="compact">Compact View</option>
      </select>
    </div>

    <div class="reports-stats">
      <div class="stat-item"><span id="countTotal" class="stat-number">0</span> Total</div>
      <div class="stat-item"><span id="countResolved" class="stat-number">0</span> Resolved</div>
      <div class="stat-item"><span id="countProgress" class="stat-number">0</span> In Progress</div>
      <div class="stat-item"><span id="countPending" class="stat-number">0</span> Pending</div>
    </div>

    <section id="reportsGrid" class="reports-grid card"></section>

  </div>

</main>


<!-- Modal -->
<div id="modal" class="modal-overlay" style="display:none;">
  <div class="modal-dialog">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div id="modalContent"></div>
  </div>
</div>



<script src="../../js/user/MyReports.js"></script>
</body>
</html>
