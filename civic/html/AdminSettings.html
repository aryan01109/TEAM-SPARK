<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Admin Settings – Smart City</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">

  <link rel="stylesheet" href="../css/adminSettings.css">
</head>

<body>

<div class="settings-card">
  <h2>⚙️ Admin Settings</h2>

  <label>Name</label>
  <input id="name">

  <label>Email</label>
  <input id="email">

  <label>Department</label>
  <input id="department">

  <label>Language</label>
  <select id="language">
    <option>English</option>
    <option>Hindi</option>
    <option>Gujarati</option>
  </select>

  <label class="check">
    <input type="checkbox" id="notifications"> Enable Notifications
  </label>

  <button id="saveBtn">Save Settings</button>

  <hr>

  <h3>🔐 Change Password</h3>
  <input id="oldPassword" type="password" placeholder="Old Password">
  <input id="newPassword" type="password" placeholder="New Password">
  <button id="passBtn">Change Password</button>
</div>

<script src="../js/adminSettings.js"></script>
</body>
</html>
